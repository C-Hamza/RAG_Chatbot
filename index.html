<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <meta name="description" content="Upload documents and ask questions powered by AI RAG pipeline">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #1a1a2e;
            --bg-sidebar: #16213e;
            --bg-chat: #0f3460;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0b8;
            --text-muted: #6c6c8a;
            --surface: rgba(255,255,255,0.05);
            --surface-hover: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.08);
            --user-bubble: linear-gradient(135deg, #e94560 0%, #c23152 100%);
            --assistant-bubble: rgba(255,255,255,0.07);
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
        }

        html, body {
            width: 100%; height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ── Layout ────────────────────────────────── */
        .app {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            width: 100%;
        }

        /* ── Left Sidebar ──────────────────────────── */
        .sidebar {
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-new-chat {
            width: 100%;
            padding: 10px 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-new-chat:hover { background: var(--accent-hover); transform: translateY(-1px); }

        /* Session list */
        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .session-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            position: relative;
        }
        .session-item:hover { background: var(--surface-hover); }
        .session-item.active { background: var(--surface); border-left: 3px solid var(--accent); }

        .session-item-info {
            flex: 1;
            min-width: 0;
        }

        .session-title {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .session-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .session-delete {
            opacity: 0;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            border-radius: 4px;
            transition: all var(--transition);
        }
        .session-item:hover .session-delete { opacity: 1; }
        .session-delete:hover { color: var(--accent); background: rgba(233,69,96,0.15); }

        /* Upload section at bottom of sidebar */
        .sidebar-upload {
            padding: 12px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.15);
        }

        .upload-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
        }
        .upload-zone:hover { border-color: var(--accent); background: rgba(233,69,96,0.05); }
        .upload-zone.dragover { border-color: var(--accent); background: rgba(233,69,96,0.1); }

        .upload-zone input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-zone-text {
            font-size: 12px;
            color: var(--text-muted);
        }
        .upload-zone-text span { color: var(--accent); font-weight: 600; }

        .upload-file-list {
            margin-top: 8px;
            max-height: 80px;
            overflow-y: auto;
        }

        .upload-file-item {
            font-size: 11px;
            color: var(--text-secondary);
            padding: 3px 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-upload {
            width: 100%;
            margin-top: 8px;
            padding: 8px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: none;
        }
        .btn-upload:hover { background: var(--accent-hover); }
        .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-upload.visible { display: block; }

        .upload-status {
            margin-top: 6px;
            font-size: 11px;
            padding: 6px 8px;
            border-radius: 4px;
            display: none;
        }
        .upload-status.success { display: block; background: rgba(46,204,113,0.15); color: #2ecc71; }
        .upload-status.error { display: block; background: rgba(233,69,96,0.15); color: var(--accent); }
        .upload-status.loading { display: block; background: rgba(52,152,219,0.15); color: #3498db; }

        /* ── Main Chat Area ────────────────────────── */
        .main {
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
        }

        .chat-header-title {
            font-size: 15px;
            font-weight: 600;
        }

        .chat-header-docs {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .doc-badge {
            background: rgba(233,69,96,0.2);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Messages area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 75%;
            animation: fadeIn 0.3s ease;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .message.user .msg-avatar { background: var(--accent); }
        .message.assistant .msg-avatar { background: var(--bg-chat); }

        .msg-body {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user .msg-body {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .msg-body {
            background: var(--assistant-bubble);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .msg-label {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: rgba(255,255,255,0.6);
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 12px 16px;
            background: var(--assistant-bubble);
            border-radius: var(--radius);
            gap: 4px;
        }
        .typing-indicator.visible { display: flex; }
        .typing-dot {
            width: 8px; height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 12px;
            color: var(--text-muted);
        }
        .empty-state-icon { font-size: 48px; opacity: 0.5; }
        .empty-state p { font-size: 14px; text-align: center; }

        /* Input area */
        .chat-input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.15);
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-row textarea {
            flex: 1;
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            min-height: 46px;
            max-height: 140px;
            outline: none;
            transition: border-color var(--transition);
            line-height: 1.5;
        }
        .input-row textarea:focus { border-color: var(--accent); }
        .input-row textarea::placeholder { color: var(--text-muted); }

        .btn-send {
            width: 46px; height: 46px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Responsive */
        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .sidebar.mobile-open { display: flex; position: fixed; inset: 0; z-index: 100; width: 280px; }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- ── Sidebar ── -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>📚 RAG Chat</h2>
                <button class="btn-new-chat" id="btnNewChat" onclick="createNewSession()">
                    ✚ New Chat
                </button>
            </div>

            <div class="session-list" id="sessionList">
                <!-- Sessions rendered here -->
            </div>

            <div class="sidebar-upload">
                <div class="upload-title">📄 Upload Documents</div>
                <div class="upload-zone" id="uploadZone">
                    <input type="file" id="fileInput" multiple accept=".pdf,.docx,.txt">
                    <div class="upload-zone-text">
                        <span>Choose files</span> or drag & drop<br>
                        PDF, DOCX, TXT
                    </div>
                </div>
                <div class="upload-file-list" id="fileList"></div>
                <button class="btn-upload" id="btnUpload" onclick="uploadFiles()">⬆ Upload</button>
                <div class="upload-status" id="uploadStatus"></div>
            </div>
        </aside>

        <!-- ── Main Chat ── -->
        <main class="main">
            <div class="chat-header" id="chatHeader">
                <div class="chat-header-title" id="chatTitle">Welcome</div>
                <div class="chat-header-docs" id="chatDocs"></div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">💬</div>
                    <p>Upload a document and start asking questions</p>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>

            <div class="chat-input-area">
                <div class="input-row">
                    <textarea id="userInput" rows="1" placeholder="Ask a question about your documents..." spellcheck="true"></textarea>
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </main>
    </div>

<script>
const API = "http://localhost:8000";

// ── DOM refs ──
const sessionListEl  = document.getElementById("sessionList");
const chatMessages   = document.getElementById("chatMessages");
const chatTitle      = document.getElementById("chatTitle");
const chatDocs       = document.getElementById("chatDocs");
const emptyState     = document.getElementById("emptyState");
const typingEl       = document.getElementById("typingIndicator");
const userInput      = document.getElementById("userInput");
const sendBtn        = document.getElementById("sendBtn");
const fileInput      = document.getElementById("fileInput");
const fileListEl     = document.getElementById("fileList");
const btnUpload      = document.getElementById("btnUpload");
const uploadStatusEl = document.getElementById("uploadStatus");
const uploadZone     = document.getElementById("uploadZone");

let activeSessionId = null;

// ── Auto-resize textarea ──
userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + "px";
});
userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── File input ──
fileInput.addEventListener("change", () => {
    renderFileList();
});

// Drag & Drop
uploadZone.addEventListener("dragover", (e) => { e.preventDefault(); uploadZone.classList.add("dragover"); });
uploadZone.addEventListener("dragleave", () => { uploadZone.classList.remove("dragover"); });
uploadZone.addEventListener("drop", (e) => {
    e.preventDefault();
    uploadZone.classList.remove("dragover");
    fileInput.files = e.dataTransfer.files;
    renderFileList();
});

function renderFileList() {
    const files = fileInput.files;
    fileListEl.innerHTML = "";
    if (files.length === 0) { btnUpload.classList.remove("visible"); return; }
    btnUpload.classList.add("visible");
    for (const f of files) {
        const d = document.createElement("div");
        d.className = "upload-file-item";
        d.textContent = "📎 " + f.name;
        fileListEl.appendChild(d);
    }
}

// ── Sessions ──
async function loadSessions() {
    try {
        const res = await fetch(`${API}/sessions`);
        const data = await res.json();
        activeSessionId = data.active;
        renderSessions(data.sessions);
        // Load the active session's history
        if (activeSessionId) loadSessionHistory(activeSessionId);
        updateChatHeader();
    } catch (e) {
        console.error("Failed to load sessions", e);
    }
}

function renderSessions(sessions) {
    sessionListEl.innerHTML = "";
    for (const s of sessions) {
        const div = document.createElement("div");
        div.className = "session-item" + (s.id === activeSessionId ? " active" : "");
        div.onclick = () => switchSession(s.id);
        div.innerHTML = `
            <div class="session-item-info">
                <div class="session-title">${escapeHtml(s.title)}</div>
                <div class="session-meta">${s.message_count} messages · ${s.document_count} docs</div>
            </div>
            <button class="session-delete" onclick="event.stopPropagation(); deleteSession('${s.id}')" title="Delete">✕</button>
        `;
        sessionListEl.appendChild(div);
    }
}

async function createNewSession() {
    try {
        const res = await fetch(`${API}/sessions`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: "New Chat" })
        });
        const data = await res.json();
        activeSessionId = data.session.id;
        clearChatUI();
        await loadSessions();
    } catch (e) { console.error(e); }
}

async function switchSession(id) {
    try {
        const res = await fetch(`${API}/sessions/${id}/switch`, { method: "POST" });
        const data = await res.json();
        activeSessionId = id;
        clearChatUI();
        await loadSessions();
    } catch (e) { console.error(e); }
}

async function deleteSession(id) {
    if (!confirm("Delete this conversation?")) return;
    try {
        const res = await fetch(`${API}/sessions/${id}`, { method: "DELETE" });
        const data = await res.json();
        activeSessionId = data.active;
        clearChatUI();
        await loadSessions();
    } catch (e) { console.error(e); }
}

async function loadSessionHistory(sessionId) {
    try {
        const res = await fetch(`${API}/sessions/${sessionId}/history`);
        const data = await res.json();
        clearChatUI();
        if (data.history && data.history.length > 0) {
            for (const msg of data.history) {
                addMessage(msg.role, msg.content, false);
            }
        }
    } catch (e) { console.error(e); }
}

function updateChatHeader() {
    // Find active session from the rendered list
    const items = sessionListEl.querySelectorAll(".session-item");
    // Update title from session list
    const activeItem = sessionListEl.querySelector(".session-item.active .session-title");
    if (activeItem) chatTitle.textContent = activeItem.textContent;
}

// ── Chat ──
async function sendMessage() {
    const msg = userInput.value.trim();
    if (!msg) return;

    addMessage("user", msg);
    userInput.value = "";
    userInput.style.height = "auto";
    sendBtn.disabled = true;
    typingEl.classList.add("visible");

    try {
        const res = await fetch(`${API}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: msg })
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || "Request failed");
        }
        const data = await res.json();
        addMessage("assistant", data.response);
        // Refresh sidebar to show updated title/counts
        refreshSessionList();
    } catch (e) {
        addMessage("assistant", "Error: " + e.message);
    } finally {
        sendBtn.disabled = false;
        typingEl.classList.remove("visible");
        userInput.focus();
    }
}

async function refreshSessionList() {
    try {
        const res = await fetch(`${API}/sessions`);
        const data = await res.json();
        renderSessions(data.sessions);
        updateChatHeader();
    } catch (e) { /* silent */ }
}

// ── Upload ──
async function uploadFiles() {
    const files = fileInput.files;
    if (files.length === 0) return;

    const formData = new FormData();
    for (const f of files) formData.append("files", f);

    btnUpload.disabled = true;
    showUploadStatus("Uploading & processing...", "loading");

    try {
        const res = await fetch(`${API}/upload`, { method: "POST", body: formData });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || "Upload failed");
        }
        const data = await res.json();
        showUploadStatus(`✓ ${data.files_processed} file(s) processed`, "success");
        fileInput.value = "";
        fileListEl.innerHTML = "";
        btnUpload.classList.remove("visible");
        addMessage("assistant", `Uploaded ${data.files_processed} document(s) (${data.total_chunks} chunks). Ask me anything about them!`);
        refreshSessionList();
    } catch (e) {
        showUploadStatus("Error: " + e.message, "error");
    } finally {
        btnUpload.disabled = false;
    }
}

// ── UI Helpers ──
function addMessage(role, content, animate = true) {
    if (emptyState) emptyState.remove();

    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;
    if (!animate) wrapper.style.animation = "none";

    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.textContent = role === "user" ? "👤" : "🤖";

    const body = document.createElement("div");
    body.className = "msg-body";
    body.textContent = content;

    wrapper.appendChild(avatar);
    wrapper.appendChild(body);
    chatMessages.appendChild(wrapper);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function clearChatUI() {
    chatMessages.innerHTML = "";
}

function showUploadStatus(msg, type) {
    uploadStatusEl.textContent = msg;
    uploadStatusEl.className = `upload-status ${type}`;
}

function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
}

// ── Init ──
window.addEventListener("load", async () => {
    try {
        const res = await fetch(`${API}/health`);
        if (res.ok) {
            console.log("✓ Connected");
            await loadSessions();
        }
    } catch (e) {
        addMessage("assistant", "⚠️ Cannot connect to backend. Is the server running on http://localhost:8000?");
    }
});
</script>
</body>
</html>
